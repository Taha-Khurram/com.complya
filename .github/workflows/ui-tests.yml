name: UI Tests

on:
  push:
    branches: [ main ]
    paths:
      - 'src/test/**' # Only triggers if files in your test folder change
  pull_request:
    branches: [ main ]
    paths:
      - 'src/test/**'
  workflow_dispatch: # Allows you to manually trigger it from the UI anytime

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    # Ensure this name exactly matches the Environment name in your GitHub Settings
    environment: Production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Setup Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Run TestNG tests
        run: mvn -B test

      - name: Generate Allure report
        if: always()
        run: mvn -B allure:report

      - name: Verify Allure output
        if: always()
        run: |
          ls -l target/site/allure-maven-plugin
          test -f target/site/allure-maven-plugin/index.html

      - name: Upload Allure HTML report (artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: target/site/allure-maven-plugin

      - name: Upload Allure HTML to Pages artifact
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: target/site/allure-maven-plugin

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: always()
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
