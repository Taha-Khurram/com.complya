name: UI Tests

on:
  push:
    branches: [ main ]
    paths:
      - 'src/test/**' # Only triggers if files in your test folder change
  pull_request:
    branches: [ main ]
    paths:
      - 'src/test/**'
  workflow_dispatch: # Allows you to manually trigger it from the UI anytime

jobs:
  test:
    runs-on: ubuntu-latest
    # Ensure this name exactly matches the Environment name in your GitHub Settings
    environment: Production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Run TestNG tests
        run: mvn -B test

      - name: Generate Allure report
        if: always()
        run: mvn -B allure:report

      - name: Upload Allure HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: target/site/allure-maven-plugin